<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Chatbot Sandbox{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">Chatbot Sandbox</a>
    <nav>
      <a href="/">Runs</a>
      <a href="/runs/new">New</a>
      <a href="/scorecard">Scorecard</a>
      <a href="/tags">Tags</a>
      <form action="/search" method="get" class="search-form">
        <input type="search" name="q" placeholder="search outputs…" value="{{ q|default('') }}">
        <button class="btn" type="submit">go</button>
      </form>
    </nav>
    <span class="dbpath" title="{{ db_path }}">db: {{ db_path }}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
